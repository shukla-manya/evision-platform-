<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technician application — action required</title>
</head>
<body style="margin:0;padding:0;background-color:#050b1a;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#050b1a;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
          <tr>
            <td style="background:#0d1626;padding:40px;border-radius:16px;border:1px solid #1e3a5f;">
              <h2 style="color:#f87171;margin:0 0 12px;font-size:20px;font-weight:700;text-align:center;">Action required</h2>
              <p style="color:#94a3b8;margin:0 0 16px;font-size:14px;text-align:center;line-height:1.75;">
                Hello {{electrician_name}}, we were unable to approve your application at this time.
              </p>
              <table width="100%" cellpadding="0" cellspacing="0" style="background:#142035;border-radius:12px;border:1px solid #1e3a5f;margin-bottom:20px;">
                <tr>
                  <td style="padding:18px 20px;">
                    <p style="color:#94a3b8;font-size:12px;margin:0 0 6px;text-transform:uppercase;letter-spacing:0.04em;">Reason</p>
                    <p style="color:#e2e8f0;font-size:14px;margin:0;line-height:1.65;">{{reason}}</p>
                  </td>
                </tr>
              </table>
              <p style="color:#94a3b8;margin:0;font-size:13px;text-align:center;line-height:1.7;">
                You can update your details and reapply from the app. Questions? Contact us at
                <a href="mailto:{{support_email}}" style="color:#38bdf8;text-decoration:none;">{{support_email}}</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
