<div style="text-align:center;margin-bottom:22px;">
  <div style="display:inline-block;background:#451a03;border:2px solid #f59e0b;border-radius:50%;width:56px;height:56px;line-height:56px;font-size:22px;" aria-hidden="true">⭐</div>
</div>
<h2 style="color:#e2e8f0;margin:0 0 8px;font-size:20px;font-weight:600;text-align:center;">New review</h2>
<p style="color:#94a3b8;margin:0 0 22px;font-size:14px;text-align:center;line-height:1.6;">
  Hi {{electrician_name}}, a customer left you a review on {{brand_name}}.
</p>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#142035;border-radius:12px;border:1px solid #1e3a5f;">
  <tr>
    <td style="padding:18px 22px;">
      <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
        <tr>
          <td style="color:#94a3b8;font-size:13px;padding:6px 0;width:100px;">Rating</td>
          <td style="color:#f59e0b;font-size:14px;font-weight:600;padding:6px 0;">{{rating}} / 5</td>
        </tr>
        <tr>
          <td style="color:#94a3b8;font-size:13px;padding:6px 0;vertical-align:top;">Comment</td>
          <td style="color:#e2e8f0;font-size:14px;padding:6px 0;line-height:1.6;">{{comment}}</td>
        </tr>
      </table>
    </td>
  </tr>
</table>
