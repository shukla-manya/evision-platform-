<div style="text-align:center;margin-bottom:22px;">
  <div style="display:inline-block;background:#0c2340;border:2px solid #3b82f6;border-radius:50%;width:56px;height:56px;line-height:56px;font-size:24px;" aria-hidden="true">🔧</div>
</div>
<h2 style="color:#e2e8f0;margin:0 0 8px;font-size:20px;font-weight:600;text-align:center;">New booking request</h2>
<p style="color:#94a3b8;margin:0 0 22px;font-size:14px;text-align:center;line-height:1.6;">
  Hi {{electrician_name}}, a customer requested your service. Please respond within 2 hours.
</p>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#142035;border-radius:12px;border:1px solid #1e3a5f;margin-bottom:20px;">
  <tr>
    <td style="padding:18px 22px;">
      <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
        <tr>
          <td style="color:#94a3b8;font-size:13px;padding:6px 0;width:120px;vertical-align:top;">Issue</td>
          <td style="color:#e2e8f0;font-size:14px;font-weight:600;padding:6px 0;">{{issue}}</td>
        </tr>
        <tr>
          <td style="color:#94a3b8;font-size:13px;padding:6px 0;">Expires</td>
          <td style="color:#f59e0b;font-size:14px;padding:6px 0;">{{expires_at}}</td>
        </tr>
      </table>
    </td>
  </tr>
</table>
<p style="color:#94a3b8;font-size:13px;text-align:center;margin:0;">Open the {{brand_name}} app to accept or decline before it expires.</p>
