<h2 style="color:#10b981;margin:0 0 16px;font-size:20px;font-weight:700;">New contact form message</h2>
<p style="color:#94a3b8;margin:0 0 20px;font-size:14px;line-height:1.6;">
  Someone used the contact form on <strong style="color:#e2e8f0;">{{brand_name}}</strong>. Reply directly to this email to reach them (Reply-To is set).
</p>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#0a1f0f;border-radius:12px;border:1px solid #14532d;margin-bottom:16px;">
  <tr>
    <td style="padding:18px 22px;">
      <p style="margin:0 0 8px;color:#86efac;font-size:12px;font-weight:600;text-transform:uppercase;">From</p>
      <p style="margin:0;color:#e2e8f0;font-size:15px;font-weight:600;">{{from_name}}</p>
      <p style="margin:6px 0 0;color:#60a5fa;font-size:14px;"><a href="mailto:{{from_email}}" style="color:#60a5fa;text-decoration:none;">{{from_email}}</a></p>
    </td>
  </tr>
</table>
<div style="background:#142035;border-radius:12px;border:1px solid #1e3a5f;padding:18px 22px;">
  <p style="margin:0 0 12px;color:#86efac;font-size:12px;font-weight:600;text-transform:uppercase;">Message</p>
  {{message_html}}
</div>
