<div style="text-align:center;margin-bottom:22px;">
  <div style="display:inline-block;background:#0c2340;border:2px solid #3b82f6;border-radius:50%;width:56px;height:56px;line-height:56px;font-size:22px;" aria-hidden="true">📋</div>
</div>
<h2 style="color:#e2e8f0;margin:0 0 8px;font-size:20px;font-weight:600;text-align:center;">Service job update</h2>

</p>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#142035;border-radius:12px;border:1px solid #1e3a5f;">

      <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
        <tr>
          <td style="color:#94a3b8;font-size:13px;padding:6px 0;width:120px;">Technician</td>
          <td style="color:#e2e8f0;font-size:14px;font-weight:600;padding:6px 0;">{{electrician_name}}</td>
        </tr>
        <tr>
          <td style="color:#94a3b8;font-size:13px;padding:6px 0;">Status</td>
          <td style="color:#3b82f6;font-size:14px;font-weight:600;padding:6px 0;">{{status}}</td>
        </tr>
      </table>
    </td>
  </tr>
</table>
<p style="color:#64748b;font-size:12px;margin:18px 0 0;text-align:center;">Open the {{brand_name}} app for live tracking and messages.</p>
