<h2 style="color:#e2e8f0;margin:0 0 10px;font-size:20px;font-weight:600;">New shop registration</h2>
<p style="color:#94a3b8;margin:0 0 24px;font-size:14px;line-height:1.6;">A new shop has registered and is awaiting approval in the superadmin panel.</p>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#142035;border-radius:12px;overflow:hidden;border:1px solid #1e3a5f;">
  <tr>
    <td style="padding:20px 24px;">
      <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
        <tr>
          <td style="color:#94a3b8;font-size:13px;padding:8px 0;width:140px;">Shop</td>
          <td style="color:#e2e8f0;font-size:14px;font-weight:600;padding:8px 0;">{{shop_name}}</td>
        </tr>
        <tr>
          <td style="color:#94a3b8;font-size:13px;padding:8px 0;">Owner</td>
          <td style="color:#e2e8f0;font-size:14px;padding:8px 0;">{{owner_name}}</td>
        </tr>
        <tr>
          <td style="color:#94a3b8;font-size:13px;padding:8px 0;">Email</td>
          <td style="color:#60a5fa;font-size:14px;padding:8px 0;">{{admin_email}}</td>
        </tr>
        <tr>
          <td style="color:#94a3b8;font-size:13px;padding:8px 0;">Phone</td>
          <td style="color:#e2e8f0;font-size:14px;padding:8px 0;">{{admin_phone}}</td>
        </tr>
      </table>
    </td>
  </tr>
</table>
<div style="text-align:center;margin-top:28px;">
  <a href="{{dashboard_url}}" style="display:inline-block;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;text-decoration:none;padding:14px 32px;border-radius:8px;font-size:15px;font-weight:600;">Review registration</a>
</div>
<p style="color:#64748b;font-size:12px;margin:24px 0 0;line-height:1.6;">Approve or reject from the superadmin dashboard. The applicant will be notified by email.</p>
