<div style="text-align:center;margin-bottom:20px;">
  <div style="display:inline-block;background:#450a0a;border:2px solid #ef4444;border-radius:50%;width:56px;height:56px;line-height:56px;font-size:22px;color:#fca5a5;" aria-hidden="true">!</div>
</div>
<h2 style="color:#fca5a5;margin:0 0 10px;font-size:22px;font-weight:700;text-align:center;">Payment failed</h2>
<p style="color:#94a3b8;margin:0 0 18px;font-size:14px;text-align:center;line-height:1.6;">
  Hi {{customer_name}}, we could not complete payment for this checkout.
</p>
<table width="100%" cellpadding="0" cellspacing="0" style="background:#142035;border-radius:12px;border:1px solid #1e3a5f;margin-bottom:18px;">
  <tr>
    <td style="padding:18px 22px;">
      <p style="color:#94a3b8;font-size:12px;margin:0 0 6px;text-transform:uppercase;">Order reference</p>
      <p style="color:#e2e8f0;font-size:15px;font-weight:600;margin:0 0 14px;">{{order_group_id}}</p>
      <p style="color:#94a3b8;font-size:12px;margin:0 0 6px;text-transform:uppercase;">Reason</p>
      <p style="color:#e2e8f0;font-size:14px;margin:0;line-height:1.5;">{{reason}}</p>
    </td>
  </tr>
</table>
<div style="text-align:center;">
  <a href="{{retry_url}}" style="display:inline-block;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;">Return to cart</a>
</div>
