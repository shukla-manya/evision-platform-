<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Confirmed</title>
</head>
<body style="margin:0;padding:0;background:#050b1a;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:30px 12px;background:#050b1a;">
    <tr>
      <td align="center">
        <table width="620" cellpadding="0" cellspacing="0" style="max-width:620px;background:#0d1626;border:1px solid #1e3a5f;border-radius:14px;overflow:hidden;">
          <tr><td style="padding:28px 28px 12px;color:#e2e8f0;font-size:22px;font-weight:700;">Payment Confirmed</td></tr>
          <tr><td style="padding:0 28px 8px;color:#94a3b8;font-size:14px;">Hi {{customer_name}}, your payment was successful.</td></tr>
          <tr><td style="padding:0 28px 22px;color:#94a3b8;font-size:14px;">Order Group: <strong style="color:#e2e8f0;">{{order_group_id}}</strong></td></tr>
          <tr><td style="padding:0 28px 22px;color:#94a3b8;font-size:14px;">Amount Paid: <strong style="color:#10b981;">INR {{amount}}</strong></td></tr>
          <tr><td style="padding:0 28px 28px;"><a href="{{orders_url}}" style="display:inline-block;background:#3b82f6;color:#fff;text-decoration:none;padding:10px 16px;border-radius:8px;font-size:14px;">View Orders</a></td></tr>
          <tr><td style="padding:16px 28px;color:#64748b;font-size:12px;border-top:1px solid #1e3a5f;">E Vision Pvt. Ltd.</td></tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
