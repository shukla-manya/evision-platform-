<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dealer pricing active</title>
</head>
<body style="margin:0;padding:0;background-color:#050b1a;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#050b1a;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
          <tr>
            <td style="background:#0d1626;padding:40px;border-radius:16px;border:1px solid #1e3a5f;">
              <h2 style="color:#10b981;margin:0 0 12px;font-size:22px;font-weight:700;text-align:center;">Your dealer pricing is now active</h2>
              <p style="color:#94a3b8;margin:0;font-size:14px;text-align:center;line-height:1.7;">
                Hi {{dealer_name}}, your GST number has been verified. Enjoy <strong style="color:#e2e8f0;">exclusive wholesale rates</strong> on all products in {{brand_name}}.
              </p>
              <div style="text-align:center;margin-top:28px;">
                <a href="{{shop_url}}" style="display:inline-block;background:linear-gradient(135deg,#10b981,#059669);color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;">Browse catalogue →</a>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
