<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Technician account approved</title>
</head>
<body style="margin:0;padding:0;background-color:#050b1a;font-family:'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#050b1a;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">
          <tr>
            <td style="background:#0d1626;padding:40px;border-radius:16px;border:1px solid #1e3a5f;">
              <h2 style="color:#22c55e;margin:0 0 12px;font-size:20px;font-weight:700;text-align:center;">Welcome to {{brand_name}}</h2>
              <p style="color:#94a3b8;margin:0;font-size:14px;text-align:center;line-height:1.75;">
                Hello {{electrician_name}}, your technician profile has been verified and approved. Open the {{brand_name}} Technician app, sign in with your mobile number, go online, and start receiving job requests in your area.
              </p>
              <div style="text-align:center;margin-top:28px;">
                <a href="{{login_url}}" style="display:inline-block;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:600;">Open technician sign-in →</a>
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
