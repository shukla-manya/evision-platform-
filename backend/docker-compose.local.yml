# Local stack: DynamoDB Local + MinIO (S3-compatible)
# Usage: docker compose -f docker-compose.local.yml up -d
# Copy .env.example → .env (local block is pre-filled for this compose file).

services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: evision-dynamodb-local
    ports:
      - '8000:8000'
    command: ['-jar', 'DynamoDBLocal.jar', '-sharedDb', '-inMemory']

  minio:
    image: minio/minio:latest
    container_name: evision-minio
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ':9001'
    volumes:
      - evision-minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: evision-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/evision-uploads --ignore-existing;
      mc anonymous set download local/evision-uploads || true;
      echo 'Bucket evision-uploads ready.';
      "

volumes:
  evision-minio-data:
